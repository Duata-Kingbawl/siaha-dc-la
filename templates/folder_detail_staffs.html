<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ folder.name }} - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;800&family=Poppins:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #10b981; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--primary); color: white; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .profile-header { display: flex; align-items: center; gap: 30px; background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .profile-img { width: 180px; height: 180px; border-radius: 30px; object-fit: cover; border: 5px solid var(--accent); }
        .profile-info h1 { font-family: 'Poppins', sans-serif; font-size: 3rem; margin: 0; color: var(--accent); }
        
        .file-box { background: var(--glass); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-link { text-decoration: none; font-size: 0.75rem; font-weight: 800; margin-right: 15px; }
        .view { color: #3b82f6; } .download { color: #60a5fa; } .delete { color: #ef4444; }
        .signature { position: fixed; bottom: 30px; right: 40px; font-family: 'Dancing Script', cursive; font-size: 28px; color: var(--accent); opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/category/STAFFS" style="color: var(--accent); text-decoration: none; font-weight: 800;">← BACK TO STAFF LIST</a>
        
        <div class="profile-header">
            <img src="{{ url_for('static', filename='uploads/' + folder.image) }}" class="profile-img">
            <div class="profile-info">
                <p style="opacity: 0.5; margin: 0;">OFFICE STAFF</p>
                <h1>{{ folder.name }}</h1>
                <p style="color: var(--accent);">Personal Records & Documents</p>
            </div>
        </div>

        <div class="file-box">
            <form action="/upload_file/{{ folder.id }}" method="POST" enctype="multipart/form-data" style="margin-bottom: 30px; display: flex; gap: 10px;">
                <input type="text" name="project_name" placeholder="File Description..." required style="flex:1; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: none; color: white;">
                <input type="file" name="file" required style="color: white; font-size: 0.8rem;">
                <button type="submit" style="background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: 800; cursor: pointer;">UPLOAD</button>
            </form>

            <table>
                <thead><tr><th>FILE DESCRIPTION</th><th>ACTIONS</th></tr></thead>
                <tbody>
                    {% for file in files %}
                    <tr>
                        <td style="font-weight: 600;">{{ file.project_name }}</td>
                        <td>
                            <a href="/view_file/{{ file.filename }}" target="_blank" class="action-link view">VIEW</a>
                            <a href="{{ url_for('static', filename='uploads/' + file.filename) }}" class="action-link download" download>DOWNLOAD</a>
                            <a href="/delete_file/{{ file.id }}/{{ folder.id }}" class="action-link delete" onclick="return confirm('Paih duh tak tak em?')">DELETE</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="signature">Duata Kingbawl</div>
</body>
</html>
